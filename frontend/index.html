<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Помічник трейдера</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#283040;
    --ink:#e8edf4; --muted:#8b97a8; --teal:#3fb6a8; --gold:#d4a843;
    --green:#46b76b; --red:#d96a6a; --blue:#5a8fd4;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:20px 16px 60px}
  .mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  header.top{display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:20px}
  .brand{font-size:18px;font-weight:700;letter-spacing:.2px}
  .brand small{display:block;font-weight:400;color:var(--muted);font-size:12px;margin-top:2px}
  .status-pill{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--line)}
  .st-run{color:var(--green);border-color:rgba(70,183,107,.4);background:rgba(70,183,107,.08)}
  .st-pause{color:var(--gold);border-color:rgba(212,168,67,.4);background:rgba(212,168,67,.08)}
  .st-stop{color:var(--muted)}
  .badge-demo{color:var(--gold);border-color:rgba(212,168,67,.4);background:rgba(212,168,67,.08)}
  .badge-live{color:var(--blue);border-color:rgba(90,143,212,.4);background:rgba(90,143,212,.08)}
  .badge-risk{color:var(--ink);border-color:var(--line);background:var(--panel2)}
  .grid{display:grid;gap:14px}
  .cols-4{grid-template-columns:repeat(4,1fr)}
  .cols-2{grid-template-columns:1.6fr 1fr}
  @media(max-width:760px){.cols-4{grid-template-columns:repeat(2,1fr)}.cols-2{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .stat .label{font-size:12px;color:var(--muted);margin-bottom:6px}
  .stat .val{font-size:24px;font-weight:700;letter-spacing:-.5px}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:4px}
  .pos{color:var(--green)} .neg{color:var(--red)}
  h3{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);
    margin:0 0 12px;font-weight:600}
  .action-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
  button{font-family:inherit;font-size:14px;font-weight:600;border-radius:9px;
    padding:11px 18px;border:1px solid var(--line);background:var(--panel2);
    color:var(--ink);cursor:pointer;transition:.15s}
  button:hover{border-color:var(--muted)}
  button:disabled{opacity:.4;cursor:not-allowed}
  .btn-go{background:var(--teal);border-color:var(--teal);color:#06231f}
  .btn-stop{background:transparent;border-color:rgba(217,106,106,.5);color:var(--red)}
  .btn-ghost{background:transparent}
  .verdict{display:flex;gap:12px;align-items:flex-start;padding:14px;border-radius:10px;
    background:var(--panel2);border:1px solid var(--line);font-size:14px;line-height:1.5}
  .verdict .dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex:none;background:var(--blue)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--muted);font-weight:500;padding:8px 6px;border-bottom:1px solid var(--line);font-size:12px}
  td{padding:9px 6px;border-bottom:1px solid var(--panel2)}
  .tag{font-size:11px;padding:2px 8px;border-radius:6px;background:var(--panel2);color:var(--muted)}
  .tag.win{color:var(--green);background:rgba(70,183,107,.1)}
  .tag.loss{color:var(--red);background:rgba(217,106,106,.1)}
  .tag.reject{color:var(--gold);background:rgba(212,168,67,.1)}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:24px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .chip{font-size:11px;color:var(--muted);background:var(--panel2);padding:3px 8px;border-radius:6px}
  .hint{border-bottom:1px dotted var(--muted);cursor:help}
  .setup{display:grid;gap:14px;max-width:420px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  .field input,.field select{width:100%;padding:10px;border-radius:8px;background:var(--bg);
    color:var(--ink);border:1px solid var(--line);font-family:inherit;font-size:14px}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;padding:9px}
  .seg button.on{background:var(--teal);border-color:var(--teal);color:#06231f}
  .note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:4px}
  .foot{margin-top:28px;font-size:11px;color:var(--muted);line-height:1.6;
    border-top:1px solid var(--line);padding-top:16px}
  .disclaimer-box{display:flex;gap:12px;align-items:flex-start;background:rgba(212,168,67,.08);
    border:1px solid rgba(212,168,67,.35);border-radius:10px;padding:14px 16px;
    margin-bottom:18px;font-size:13px;line-height:1.6;color:var(--ink)}
  .disclaimer-box .icon{font-size:18px;flex:none;line-height:1.4}
  .disclaimer-box b{color:var(--gold)}
  .plain-card{max-width:520px;margin:0 auto}
  .plain-assets{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .plain-assets button{flex:1;min-width:110px}
  .plain-headline{font-size:22px;font-weight:700;line-height:1.4;margin:0 0 16px}
  .plain-details{list-style:none;margin:0;padding:0;display:grid;gap:10px}
  .plain-details li{font-size:15px;line-height:1.5;color:var(--ink);
    background:var(--panel2);border-radius:10px;padding:12px 14px}
  .plain-price{font-size:13px;color:var(--muted);margin-bottom:10px}
  .link-btn{background:none;border:none;color:var(--teal);cursor:pointer;
    font-size:13px;padding:0;text-decoration:underline}
  .prob-bar{display:flex;height:14px;border-radius:7px;overflow:hidden;margin:10px 0;
    border:1px solid var(--line)}
  .prob-bar .up{background:var(--green)} .prob-bar .down{background:var(--red)}
  .prob-bar .flat{background:var(--muted)}
  .prob-legend{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
  .factors-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
  @media(max-width:520px){.factors-cols{grid-template-columns:1fr}}
  .factors-cols h4{font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin:0 0 8px}
  .factors-cols .for h4{color:var(--green)} .factors-cols .against h4{color:var(--red)}
  .factors-cols ul{list-style:none;margin:0;padding:0;display:grid;gap:6px}
  .factors-cols li{font-size:13px;line-height:1.4;background:var(--panel2);
    border-radius:8px;padding:8px 10px}
  .details-panel{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .btn-row{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap}
  .step-dots{display:flex;justify-content:center;gap:8px;margin-bottom:14px}
  .step-dots span{width:8px;height:8px;border-radius:50%;background:var(--line)}
  .step-dots span.on{background:var(--teal);width:20px;border-radius:4px}
  .btn-flow{width:100%;padding:16px;font-size:16px;border-radius:12px;margin-top:18px}
  .case-card{text-align:left;width:100%;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:16px;cursor:pointer;transition:.15s;font-family:inherit}
  .case-card:hover{border-color:var(--muted)}
  .case-card .case-top{display:flex;justify-content:space-between;align-items:baseline}
  .case-card .case-asset{font-size:16px;font-weight:700;color:var(--ink)}
  .case-card .case-period{font-size:12px;color:var(--muted);margin-top:2px}
  .shield-row{display:flex;gap:10px;align-items:flex-start;background:rgba(70,183,107,.08);
    border:1px solid rgba(70,183,107,.3);border-radius:10px;padding:12px 14px;margin-bottom:10px}
  .shield-row .icon{font-size:18px;flex:none}
  .case-table td,.case-table th{white-space:nowrap}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;
// Якщо інтерфейс відкрито з сервера (http://...), використовуємо той самий
// домен. Якщо відкрито як файл — звертаємось до локального сервера.
const API = location.protocol.startsWith("http") ? "" : "http://localhost:8000";
const f2 = n => (n==null?"—":Number(n).toLocaleString("uk-UA",{minimumFractionDigits:2,maximumFractionDigits:2}));

async function call(path,opts){
  try{ const r=await fetch(API+path,opts); return await r.json(); }
  catch(e){ return {error:true}; }
}

function Sparkline({data}){
  if(!data||data.length<2) return <div className="empty">Графік зʼявиться після старту</div>;
  const w=600,h=140,pad=6;
  const min=Math.min(...data),max=Math.max(...data),rng=(max-min)||1;
  const pts=data.map((v,i)=>[pad+i/(data.length-1)*(w-2*pad),h-pad-(v-min)/rng*(h-2*pad)]);
  const d=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const up=data[data.length-1]>=data[0];
  const col=up?"#46b76b":"#d96a6a";
  const area=d+` L ${w-pad} ${h-pad} L ${pad} ${h-pad} Z`;
  return (<svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:140}}>
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor={col} stopOpacity="0.18"/>
      <stop offset="100%" stopColor={col} stopOpacity="0"/></linearGradient></defs>
    <path d={area} fill="url(#g)"/><path d={d} fill="none" stroke={col} strokeWidth="2"/>
  </svg>);
}

const SIMPLE_ASSETS = ["BTC/USDT","ETH/USDT","SOL/USDT"];
const SIMPLE_STEPS = 3;

function StepDots({step}){
  return (<div className="step-dots">
    {Array.from({length:SIMPLE_STEPS}).map((_,i)=>
      <span key={i} className={i+1===step?"on":""}></span>)}
  </div>);
}

function SimpleScreen1({onBack,onNext}){
  const [asset,setAsset]=useState(SIMPLE_ASSETS[0]);
  const [s,setS]=useState(null);
  const [loading,setLoading]=useState(true);
  const [err,setErr]=useState("");

  useEffect(()=>{
    let cancelled=false;
    setLoading(true); setErr("");
    call("/api/situation?asset="+encodeURIComponent(asset)).then(r=>{
      if(cancelled) return;
      if(r && !r.error){ setS(r); }
      else { setErr((r&&r.message)||"Не вдалося отримати дані з біржі. Спробуйте пізніше."); }
      setLoading(false);
    });
    return ()=>{cancelled=true};
  },[asset]);

  return (<div className="plain-card">
    <StepDots step={1}/>
    <h3 style={{textAlign:"center"}}>Що система бачить</h3>
    <div className="plain-assets">
      {SIMPLE_ASSETS.map(a=>
        <button key={a} className={a===asset?"on":""} onClick={()=>setAsset(a)}>{a.replace("/USDT","")}</button>)}
    </div>
    <div className="card">
      {err ? <div className="empty" style={{color:"var(--red)"}}>{err}</div> :
       loading||!s ? <div className="empty">Дивимось на ринок…</div> : (<>
        <div className="plain-price mono">Поточна ціна: ${f2(s.price)}</div>
        <p className="plain-headline">{s.headline}</p>
        <ul className="plain-details">
          {s.details.map((line,i)=><li key={i}>{line}</li>)}
        </ul>
      </>)}
    </div>
    <p className="note" style={{textAlign:"center",marginTop:16}}>
      Це просто опис ситуації — не порада купувати чи продавати.
    </p>
    <button className="btn-go btn-flow" onClick={()=>onNext(asset)}>Далі →</button>
    <div style={{textAlign:"center",marginTop:10}}>
      <button className="link-btn" onClick={onBack}>← Назад до налаштувань</button>
    </div>
  </div>);
}

function SimpleScreen2({initialAsset,onBack,onNext}){
  const [asset,setAsset]=useState(initialAsset||SIMPLE_ASSETS[0]);
  const [a,setA]=useState(null);
  const [loading,setLoading]=useState(true);
  const [details,setDetails]=useState(false);
  const [err,setErr]=useState("");

  useEffect(()=>{
    let cancelled=false;
    setLoading(true); setErr("");
    call("/api/advice?asset="+encodeURIComponent(asset)).then(r=>{
      if(cancelled) return;
      if(r && !r.error){ setA(r); }
      else { setErr((r&&r.message)||"Не вдалося отримати дані з біржі. Спробуйте пізніше."); }
      setLoading(false);
    });
    return ()=>{cancelled=true};
  },[asset]);

  const p = a && a.probability;

  return (<div className="plain-card">
    <StepDots step={2}/>
    <h3 style={{textAlign:"center"}}>Що радить і чому</h3>
    <div className="plain-assets">
      {SIMPLE_ASSETS.map(x=>
        <button key={x} className={x===asset?"on":""} onClick={()=>setAsset(x)}>{x.replace("/USDT","")}</button>)}
    </div>
    <div className="card">
      {err ? <div className="empty" style={{color:"var(--red)"}}>{err}</div> :
       loading||!a ? <div className="empty">Дивимось в історію…</div> : (<>
        <div className="plain-price mono">Поточна ціна: ${f2(a.price)}</div>

        {p ? (<>
          <p className="plain-headline" style={{fontSize:18}}>
            У схожих ситуаціях в історії ціна {p.up_pct>=p.down_pct?"частіше росла":"частіше падала"}.
          </p>
          <div className="prob-bar">
            <div className="up" style={{width:p.up_pct+"%"}}></div>
            <div className="flat" style={{width:p.flat_pct+"%"}}></div>
            <div className="down" style={{width:p.down_pct+"%"}}></div>
          </div>
          <div className="prob-legend">
            <span style={{color:"var(--green)"}}>Росла {p.up_pct}%</span>
            <span>Без змін {p.flat_pct}%</span>
            <span style={{color:"var(--red)"}}>Падала {p.down_pct}%</span>
          </div>
          {!p.sample_is_sufficient &&
            <p className="note" style={{color:"var(--gold)"}}>⚠ Схожих випадків в історії було мало ({p.sample_size}) — довіряти цій статистиці варто обережно.</p>}
        </>) : <p className="note">Замало схожих випадків в історії, щоб чесно оцінити ймовірність зараз.</p>}

        <div className="factors-cols">
          <div className="for">
            <h4>За зростання</h4>
            {a.factors_for.length ? <ul>{a.factors_for.map((f,i)=><li key={i}>{f}</li>)}</ul>
              : <div className="empty">Немає явних причин</div>}
          </div>
          <div className="against">
            <h4>За падіння</h4>
            {a.factors_against.length ? <ul>{a.factors_against.map((f,i)=><li key={i}>{f}</li>)}</ul>
              : <div className="empty">Немає явних причин</div>}
          </div>
        </div>

        {details && p && <div className="details-panel">
          <p className="note"><b>Чому саме так:</b> {p.why}</p>
          <p className="note"><b>Що може піти не так:</b> {p.what_could_go_wrong}</p>
          <p className="note">Розрахунок на основі {p.sample_size} схожих випадків в історії, горизонт — {p.horizon_candles} свічок наперед.</p>
        </div>}

        <p className="note" style={{textAlign:"center",marginTop:16}}>
          Це статистика по минулому, а НЕ порада купувати чи продавати. Рішення — за тобою.
        </p>
      </>)}
    </div>

    <div className="btn-row">
      <button className="btn-ghost" onClick={()=>setDetails(v=>!v)}>{details?"Сховати деталі":"Показати деталі"}</button>
    </div>
    <button className="btn-go btn-flow" onClick={()=>onNext(asset)}>Розумію, далі →</button>
    <div style={{textAlign:"center",marginTop:10}}>
      <button className="link-btn" onClick={onBack}>← Назад</button>
    </div>
  </div>);
}

function SimpleScreen3({initialAsset,onBack,onTry,onSkip}){
  const asset = initialAsset || SIMPLE_ASSETS[0];
  return (<div className="plain-card">
    <StepDots step={3}/>
    <h3 style={{textAlign:"center"}}>Рішення за тобою</h3>
    <div className="card">
      <p className="plain-headline" style={{textAlign:"center"}}>
        Що робити далі — вирішуєш тільки ти.
      </p>
    </div>
    <button className="btn-go btn-flow" onClick={()=>onTry(asset)}>Спробувати в тренажері</button>
    <button className="btn-ghost btn-flow" style={{marginTop:10}} onClick={onSkip}>Пропустити</button>
    <div style={{textAlign:"center",marginTop:14}}>
      <button className="link-btn" onClick={onBack}>← Назад</button>
    </div>
  </div>);
}

const fDate = (iso) => iso ? iso.slice(0,10) : "—";
const fTime = (iso) => iso ? new Date(iso).toLocaleTimeString("uk-UA",
  {hour:"2-digit",minute:"2-digit",second:"2-digit"}) : "—";
const fDateTime = (iso) => iso ? new Date(iso).toLocaleString("uk-UA",
  {day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit",second:"2-digit"}) : "—";
// у fast_sim/historical час запису — це симульований момент з минулого,
// тому показуємо повну дату; у live_realtime це й так фактично "зараз" —
// досить лише часу
const journalTsFormat = (marketMode) => marketMode==="live_realtime" ? fTime : fDateTime;
const LIQUIDITY_TOOLTIP = "нижче 0.4 — угода відхиляється";
const isLiquidityReason = (reason) => !!reason && reason.includes("ліквідн");

// Мають відповідати core/session.py SessionConfig.to_risk_config()
const RISK_LEVELS = {
  conservative: {label:"Обережний",
    note:"Обережний — ризик 0.5% на угоду, без плеча, пауза при просадці 8%. Рекомендовано для початку."},
  moderate: {label:"Помірний",
    note:"Помірний — ризик 0.75% на угоду, без плеча, пауза при просадці 10%."},
  demo: {label:"Демо",
    note:"Демо — м'якші правила лише для показу угод на синтетичних даних. Не для реальних грошей."},
};
const riskLabel = (level) => (RISK_LEVELS[level]||{}).label || level || "—";
const capitalTagline = (d) => {
  if(!d || d.balance==null || d.starting==null) return "Навчання торгівлі з контролем ризику";
  if(d.pnl>0) return "Капітал зростає · контроль ризику";
  if(d.pnl<0) return "Капітал у просадці · контроль ризику";
  return "Капітал без змін · контроль ризику";
};
const HISTORICAL_YEARS = [2021,2022,2023,2024,2025];
const sourceLabel = (source) => source==="trainer_synthetic"
  ? "🎓 Кейс тренажера (синтетичні дані)" : "📊 Реальна історія цін";

function CasesScreen({onBack}){
  const [cases,setCases]=useState(null);
  const [selected,setSelected]=useState(null);
  const [detail,setDetail]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    call("/api/cases").then(r=>{
      if(r && !r.error){ setCases(r.cases||[]); setLoading(false); }
    });
  },[]);

  useEffect(()=>{
    if(!selected) return;
    setDetail(null);
    call("/api/cases/"+encodeURIComponent(selected)).then(r=>{
      if(r && !r.error) setDetail(r);
    });
  },[selected]);

  if(selected){
    return (<div className="plain-card" style={{maxWidth:720}}>
      <h3 style={{textAlign:"center"}}>Кейс: {detail ? detail.asset : selected.replace("_","/")}</h3>
      {!detail ? <div className="empty">Завантажуємо кейс…</div> : (<>
        <div className="card" style={{marginBottom:14}}>
          <div className="plain-price mono">{fDate(detail.period_start)} → {fDate(detail.period_end)}</div>
          <div className="note" style={{marginBottom:8}}>{sourceLabel(detail.source)}</div>
          <p className="plain-headline" style={{fontSize:18}}>
            Результат: <span className={detail.total_return_pct>=0?"pos":"neg"}>
              {detail.total_return_pct>=0?"+":""}{detail.total_return_pct}%
            </span> ({f2(detail.starting_equity)} → {f2(detail.ending_equity)} USD)
          </p>
          <p className="note">
            Угод: {detail.trades.length} · Система відмовилась від угоди {detail.rejected_by_risk} раз(и),
            коли ризик був завеликий.

            <div className="shield-row" key={i}>
              <span className="icon">🛡️</span>

            </div>

        </div>}

        <div className="card">
          <h3>Усі угоди</h3>
          <table className="case-table">
            <thead><tr><th>Дата</th><th>Напрям</th><th>Вхід</th><th>Вихід</th><th>P/L</th><th>Захист</th></tr></thead>
            <tbody>{detail.trades.map((t,i)=><tr key={i}>
              <td>{fDate(t.opened_at)}</td>
              <td>{t.direction==="long"?"Лонг":"Шорт"}</td>
              <td className="mono">{f2(t.entry)}</td>

            </tr>)}</tbody>
          </table>
        </div>
      </>)}
      <div style={{textAlign:"center",marginTop:14}}>
        <button className="link-btn" onClick={()=>setSelected(null)}>← До списку кейсів</button>
      </div>
    </div>);
  }

  return (<div className="plain-card" style={{maxWidth:640}}>
    <DisclaimerBanner/>
    <h3 style={{textAlign:"center"}}>Кейси</h3>
    <p className="note" style={{textAlign:"center",marginBottom:16}}>
      Реальна історія цін (без підбору вигідного періоду) і кейси, якими поділились
      користувачі з тренажера. Прибутки й збитки — обидва чесно.
    </p>
    {loading ? <div className="empty">Завантажуємо кейси…</div> :
      (!cases || !cases.length ? <div className="empty">Кейсів поки немає.</div> :
        <div style={{display:"grid",gap:10}}>
          {cases.map(c=>
            <button className="case-card" key={c.id} onClick={()=>setSelected(c.id)}>
              <div className="case-top">
                <span className="case-asset">{c.asset}</span>
                <span className={"mono "+(c.total_return_pct>=0?"pos":"neg")}>
                  {c.total_return_pct>=0?"+":""}{c.total_return_pct}%</span>
              </div>
              <div className="case-period">{fDate(c.period_start)} → {fDate(c.period_end)} · {c.trades} угод</div>
              <div className="note" style={{marginTop:4}}>{sourceLabel(c.source)}</div>
              {c.stop_loss_saves>0 && <div className="note" style={{marginTop:6,color:"var(--green)"}}>

  const [risk,setRisk]=useState("conservative");
  const [mode,setMode]=useState("paper");
  const [marketMode,setMarketMode]=useState("historical");
  const [historicalYear,setHistoricalYear]=useState(HISTORICAL_YEARS[HISTORICAL_YEARS.length-1]);
  const [confirmed,setConfirmed]=useState(false);
  const passed = backtestResult && backtestResult.passed;
  return (<>
    <DisclaimerBanner/>
    <div className="card">
    <h3>Налаштування стратегії</h3>
    <div style={{textAlign:"center",marginBottom:8}}>
      <button className="link-btn" onClick={onSimple}>Спочатку простий огляд (3 кроки) →</button>
    </div>
    <div style={{textAlign:"center",marginBottom:8}}>

    </div>
    <div style={{textAlign:"center",marginBottom:8}}>

    </div>

    </div>

      <div className="field"><label>Сума для роботи (USD)</label>

          <button key={a} className={amount===a?"on":""} onClick={()=>setAmount(a)}>{a}</button>)}</div>
        <input className="mono" type="number" value={amount} onChange={e=>setAmount(+e.target.value)} style={{marginTop:8}}/>
      </div>
      <div className="field"><label>Рівень ризику</label>
        <div className="seg">
          <button className={risk==="conservative"?"on":""} onClick={()=>setRisk("conservative")}>Обережний</button>
          <button className={risk==="moderate"?"on":""} onClick={()=>setRisk("moderate")}>Помірний</button>
        </div>
        <p className="note">{RISK_LEVELS[risk].note}</p>
      </div>
      <div className="field"><label>Режим</label>
        <div className="seg">
          <button className={mode==="paper"?"on":""} onClick={()=>setMode("paper")}>Paper (без грошей)</button>
          <button className={mode==="live"?"on":""} onClick={()=>setMode("live")}>Live (реальні гроші)</button>
        </div>
      </div>

      <div className="field"><label>Дані ринку (Paper)</label>
        <div className="seg">
          <button className={marketMode==="historical"?"on":""} onClick={()=>setMarketMode("historical")}>
            📜 Історія — реальні дані за {historicalYear}, прискорено</button>
          <button className={marketMode==="live_realtime"?"on":""} onClick={()=>setMarketMode("live_realtime")}>
            🌐 Реальний час — поточний ринок, віртуальні гроші</button>
        </div>
        {marketMode==="historical" && <div className="seg" style={{marginTop:8}}>
          {HISTORICAL_YEARS.map(y=>
            <button key={y} className={historicalYear===y?"on":""} onClick={()=>setHistoricalYear(y)}>{y}</button>)}
        </div>}
        <p className="note">
          {marketMode==="historical"
            ? `Справжні свічки Binance за ${historicalYear} рік, відтворені прискорено — цикл проходить за хвилини. Це Paper: гроші завжди паперові, НЕ Live-режим вище. Перше завантаження року може зайняти хвилину-дві (потім кешується).`
            : "Справжні ціни з біржі (Binance) у реальному темпі, оновлення раз на хвилину. Це теж Paper — гроші віртуальні, НЕ Live-режим вище."}
        </p>
      </div>

      {mode==="live" && <div className="field" style={{background:"var(--panel2)",padding:12,borderRadius:8}}>
        <p className="note" style={{marginTop:0}}><b>Перед реальними грошима потрібно:</b></p>
        <p className="note">1. Пройти backtest (перевірка на історії).</p>
        <button className="btn-ghost" onClick={onBacktest} style={{margin:"6px 0"}}>Запустити backtest</button>
        {backtestResult && <pre className="mono" style={{whiteSpace:"pre-wrap",fontSize:11,color:passed?"var(--green)":"var(--red)",margin:"4px 0"}}>{backtestResult.summary}</pre>}

      }
    </div>
    </div>
  </>);
}

function Dashboard({d,journal,onCmd,report,understanding,onNew}){
  const s=d.stats||{};
  const pnlCls=d.pnl>=0?"pos":"neg";
  const isReport=!!report;
  const [shareMsg,setShareMsg]=useState("");
  const shareCase=async()=>{
    setShareMsg("Зберігаємо…");
    const r=await call("/api/cases/share",{method:"POST"});
    if(r&&r.error){ setShareMsg("Не вдалося зберегти кейс."); return; }
    if(r&&r.detail){ setShareMsg(typeof r.detail==="string"?r.detail:"Не вдалося зберегти кейс."); return; }
    setShareMsg("Готово! Твій кейс тепер у списку кейсів.");
  };
  return (<div>
    {!isReport ?
      <div className="action-bar">
        {d.running && !d.paused && <button className="btn-ghost" onClick={()=>onCmd("pause")}>Пауза</button>}
        {d.paused && <button className="btn-go" onClick={()=>onCmd("resume")}>Відновити</button>}
        <button className="btn-ghost" onClick={()=>onCmd("close-all")}>Закрити всі угоди</button>
        <button className="btn-stop" onClick={()=>onCmd("stop")}>Зупинити і проаналізувати</button>
      </div>
      :
      <div className="action-bar">
        <button className="btn-go" onClick={onNew}>Почати новий цикл</button>
        <button className="btn-ghost" onClick={shareCase}>Поділитися цим кейсом</button>
        {shareMsg && <span className="note" style={{alignSelf:"center"}}>{shareMsg}</span>}
      </div>
    }

    <div className="grid cols-4" style={{marginBottom:14}}>
      <div className="card stat"><div className="label">Баланс</div>
        <div className="val mono">${f2(d.balance)}</div>
        <div className={"sub mono "+pnlCls}>{d.pnl>=0?"+":""}{f2(d.pnl)} ({d.pnl_pct>=0?"+":""}{f2(d.pnl_pct)}%)</div></div>
      <div className="card stat"><div className="label">Просадка</div>
        <div className="val mono">{f2(d.drawdown_pct)}%</div>
        <div className="sub">від максимуму балансу</div></div>
      <div className="card stat"><div className="label">Win rate</div>
        <div className="val mono">{s.trades?f2(s.win_rate)+"%":"—"}</div>
        <div className="sub mono">{s.wins||0} / {s.losses||0} угод</div></div>
      <div className="card stat"><div className="label">Profit factor</div>
        <div className="val mono">{s.profit_factor??"—"}</div>
        <div className="sub">{s.sample_sufficient?"вибірка достатня":"вибірка ще мала"}</div></div>
    </div>

    <div className="grid cols-2" style={{marginBottom:14}}>
      <div className="card"><h3>Крива капіталу</h3><Sparkline data={d.equity_curve}/></div>
      <div className="card"><h3>Що система робить зараз</h3>
        <div className="verdict"><span className="dot"></span><span>{d.last_action||"—"}</span></div>
        <p className="note" style={{marginTop:12}}>Відхилено угод за цей цикл: <b className="mono">{d.rejected||0}</b>. Це нормально — система чекає якісні можливості.</p>
      </div>
    </div>

    <div className="card" style={{marginBottom:14}}>
      <h3>Відкриті позиції</h3>
      {d.open_positions&&d.open_positions.length?
        <table><thead><tr><th>Актив</th><th>Напрям</th><th>Вхід</th><th>Стоп</th><th>Тейк</th><th>Розмір</th></tr></thead>
        <tbody>{d.open_positions.map((p,i)=><tr key={i}>
          <td>{p.asset}</td><td>{p.direction==="long"?"Лонг":"Шорт"}</td>
          <td className="mono">{f2(p.entry)}</td><td className="mono">{f2(p.stop)}</td>
          <td className="mono">{f2(p.take)}</td><td className="mono">{p.size}</td></tr>)}</tbody></table>
        :<div className="empty">Немає відкритих позицій</div>}
    </div>

    <div className="card">
      <h3>Журнал рішень</h3>
      {journal&&journal.length?
        <table><thead><tr><th>{d.market_mode==="live_realtime"?"Час":"Дата й час"}</th><th>Актив</th><th>Дія</th><th>Причина</th><th>P/L</th></tr></thead>
        <tbody>{journal.map((e,i)=><tr key={i}>
          <td className="mono" style={{color:"var(--muted)",whiteSpace:"nowrap"}}>{journalTsFormat(d.market_mode)(e.ts)}</td>
          <td>{e.asset}</td>
          <td><span className={"tag "+(e.result==="win"?"win":e.result==="loss"?"loss":e.decision==="rejected"?"reject":"")}>

          <td style={{maxWidth:340,color:"var(--muted)"}}>
            {isLiquidityReason(e.reason)?
              <span className="hint" title={LIQUIDITY_TOOLTIP}>{e.reason}</span>:e.reason}
            {e.supporting&&e.supporting.length?
            <div className="chips">{e.supporting.slice(0,3).map((c,j)=><span key={j} className="chip">{c}</span>)}</div>:null}</td>
          <td className={"mono "+(e.pnl>0?"pos":e.pnl<0?"neg":"")}>{e.pnl!=null?(e.pnl>0?"+":"")+f2(e.pnl):"—"}</td>

        :<div className="empty">Журнал порожній</div>}
    </div>

    {understanding&&understanding.length>0&&<div className="card" style={{marginTop:14}}>
      <h3>Що ти тепер розумієш</h3>
      <ul className="plain-details" style={{margin:0}}>
        {understanding.map((line,i)=><li key={i}>{line}</li>)}
      </ul>
    </div>}

    {report&&<div className="card" style={{marginTop:14}}>
      <h3>Звіт після зупинки</h3>
      <pre className="mono" style={{whiteSpace:"pre-wrap",fontSize:12,color:"var(--ink)",margin:0,lineHeight:1.5}}>{report}</pre>
    </div>}
  </div>);
}

function App(){
  const [d,setD]=useState(null);
  const [journal,setJournal]=useState([]);
  const [view,setView]=useState("setup");   // setup | simple1 | simple2 | simple3 | cases | progress | support | live | report
  const [simpleAsset,setSimpleAsset]=useState(SIMPLE_ASSETS[0]);
  const [report,setReport]=useState("");
  const [understanding,setUnderstanding]=useState([]);
  const timer=useRef(null);

  const refresh=async()=>{
    const dash=await call("/api/dashboard");
    if(dash&&!dash.error){
      if(view==="setup" && !dash.running){
        // на екрані налаштувань, поки немає активної сесії, ігноруємо дані
        // ПОПЕРЕДНЬОЇ (вже завершеної) сесії — інакше бейдж режиму/року і
        // напис про капітал "застрягають" на старому циклі, поки користувач
        // ще тільки обирає рік/режим для наступного
      } else {
        setD(dash);
        // якщо сервер уже має активну сесію (напр. після перезавантаження сторінки)
        if(dash.running && view==="setup") setView("live");
      }
    }
    const j=await call("/api/journal?limit=20");
    if(j&&j.entries) setJournal(j.entries);
  };

  useEffect(()=>{ refresh(); timer.current=setInterval(refresh,1500); return ()=>clearInterval(timer.current); },[view]);

  const start=async(cfg)=>{
    setReport(""); setUnderstanding([]);
    const r=await call("/api/start",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(cfg)});
    if(r&&r.detail){ alert("Live поки недоступний:\n"+(r.detail.checks||[]).join("\n")); return; }
    setView("live"); refresh();
  };
  const [backtestResult,setBacktestResult]=useState(null);
  const runBacktest=async()=>{
    setBacktestResult({summary:"Виконую backtest…",passed:false});
    const r=await call("/api/backtest",{method:"POST"});
    if(r&&!r.error) setBacktestResult(r);
  };
  const cmd=async(c)=>{
    const r=await call("/api/"+c,{method:"POST"});
    if(c==="stop"){
      if(r.report) setReport(r.report);
      if(r.understanding) setUnderstanding(r.understanding);
      setView("report");
    }
    refresh();
  };
  const newCycle=()=>{ setReport(""); setUnderstanding([]); setD(null); setView("setup"); };

  const status = d&&d.running?(d.paused?["st-pause","Пауза"]:["st-run","Працює"])
                : (view==="report"?["st-stop","Завершено"]:["st-stop","Зупинено"]);

  return (<div className="wrap">
    <header className="top">
      <div className="brand">Помічник трейдера<small>{capitalTagline(d)}</small></div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {d&&d.running&&d.is_demo && <div className="status-pill badge-demo">🎓 Тренажер</div>}
        {d&&d.running && !d.is_demo && <div className="status-pill badge-risk">🛡️ {riskLabel(d.risk_level)}</div>}
        {d&&d.running&&d.market_mode==="live_realtime" && <div className="status-pill badge-live">🌐 Реальний час</div>}
        {d&&d.running&&d.market_mode==="historical" && <div className="status-pill badge-live">📜 Історія {d.historical_year||""}</div>}
        <div className={"status-pill "+status[0]}>{status[1]}</div>
      </div>
    </header>
    {view==="setup" && <Setup onStart={start} onBacktest={runBacktest} backtestResult={backtestResult}
      onSimple={()=>setView("simple1")} onCases={()=>setView("cases")} onProgress={()=>setView("progress")}
      onSupport={()=>setView("support")}/>}
    {view==="simple1" && <SimpleScreen1 onBack={()=>setView("setup")}
      onNext={(asset)=>{setSimpleAsset(asset); setView("simple2");}}/>}
    {view==="simple2" && <SimpleScreen2 initialAsset={simpleAsset} onBack={()=>setView("setup")}
      onNext={(asset)=>{setSimpleAsset(asset); setView("simple3");}}/>}
    {view==="simple3" && <SimpleScreen3 initialAsset={simpleAsset} onBack={()=>setView("simple2")}
      onTry={(asset)=>start({amount_usd:500, risk_level:"demo", mode:"paper", assets:[asset]})}
      onSkip={()=>setView("setup")}/>}
    {view==="cases" && <CasesScreen onBack={()=>setView("setup")}/>}
    {view==="progress" && <ProgressScreen onBack={()=>setView("setup")}/>}
    {view==="support" && <SupportScreen onBack={()=>setView("setup")}/>}
    {view==="live" && (d ? <Dashboard d={d} journal={journal} onCmd={cmd} report=""/> : <div className="empty">Завантаження…</div>)}
    {view==="report" && (d ? <Dashboard d={d} journal={journal} onCmd={cmd} report={report} understanding={understanding} onNew={newCycle}/> : <div className="empty">Звіт недоступний</div>)}
    <div className="foot">
      Це навчально-дослідницький інструмент. Він <b>не обіцяє прибутку</b> і працює в режимі Paper Trading без реальних грошей.
      Risk Engine може заблокувати будь-яку угоду заради збереження капіталу. Минулі результати не гарантують майбутніх.
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
