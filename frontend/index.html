<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Помічник трейдера</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#283040;
    --ink:#e8edf4; --muted:#8b97a8; --teal:#3fb6a8; --gold:#d4a843;
    --green:#46b76b; --red:#d96a6a; --blue:#5a8fd4;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:20px 16px 60px}
  .mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  header.top{display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:20px}
  .brand{font-size:18px;font-weight:700;letter-spacing:.2px}
  .brand small{display:block;font-weight:400;color:var(--muted);font-size:12px;margin-top:2px}
  .status-pill{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--line)}
  .st-run{color:var(--green);border-color:rgba(70,183,107,.4);background:rgba(70,183,107,.08)}
  .st-pause{color:var(--gold);border-color:rgba(212,168,67,.4);background:rgba(212,168,67,.08)}
  .st-stop{color:var(--muted)}
  .grid{display:grid;gap:14px}
  .cols-4{grid-template-columns:repeat(4,1fr)}
  .cols-2{grid-template-columns:1.6fr 1fr}
  @media(max-width:760px){.cols-4{grid-template-columns:repeat(2,1fr)}.cols-2{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .stat .label{font-size:12px;color:var(--muted);margin-bottom:6px}
  .stat .val{font-size:24px;font-weight:700;letter-spacing:-.5px}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:4px}
  .pos{color:var(--green)} .neg{color:var(--red)}
  h3{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);
    margin:0 0 12px;font-weight:600}
  .action-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
  button{font-family:inherit;font-size:14px;font-weight:600;border-radius:9px;
    padding:11px 18px;border:1px solid var(--line);background:var(--panel2);
    color:var(--ink);cursor:pointer;transition:.15s}
  button:hover{border-color:var(--muted)}
  button:disabled{opacity:.4;cursor:not-allowed}
  .btn-go{background:var(--teal);border-color:var(--teal);color:#06231f}
  .btn-stop{background:transparent;border-color:rgba(217,106,106,.5);color:var(--red)}
  .btn-ghost{background:transparent}
  .verdict{display:flex;gap:12px;align-items:flex-start;padding:14px;border-radius:10px;
    background:var(--panel2);border:1px solid var(--line);font-size:14px;line-height:1.5}
  .verdict .dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex:none;background:var(--blue)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--muted);font-weight:500;padding:8px 6px;border-bottom:1px solid var(--line);font-size:12px}
  td{padding:9px 6px;border-bottom:1px solid var(--panel2)}
  .tag{font-size:11px;padding:2px 8px;border-radius:6px;background:var(--panel2);color:var(--muted)}
  .tag.win{color:var(--green);background:rgba(70,183,107,.1)}
  .tag.loss{color:var(--red);background:rgba(217,106,106,.1)}
  .tag.reject{color:var(--gold);background:rgba(212,168,67,.1)}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:24px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .chip{font-size:11px;color:var(--muted);background:var(--panel2);padding:3px 8px;border-radius:6px}
  .setup{display:grid;gap:14px;max-width:420px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  .field input,.field select{width:100%;padding:10px;border-radius:8px;background:var(--bg);
    color:var(--ink);border:1px solid var(--line);font-family:inherit;font-size:14px}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;padding:9px}
  .seg button.on{background:var(--teal);border-color:var(--teal);color:#06231f}
  .note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:4px}
  .foot{margin-top:28px;font-size:11px;color:var(--muted);line-height:1.6;
    border-top:1px solid var(--line);padding-top:16px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;
// Якщо інтерфейс відкрито з сервера (http://...), використовуємо той самий
// домен. Якщо відкрито як файл — звертаємось до локального сервера.
const API = location.protocol.startsWith("http") ? "" : "http://localhost:8000";
const f2 = n => (n==null?"—":Number(n).toLocaleString("uk-UA",{minimumFractionDigits:2,maximumFractionDigits:2}));

async function call(path,opts){
  try{ const r=await fetch(API+path,opts); return await r.json(); }
  catch(e){ return {error:true}; }
}

function Sparkline({data}){
  if(!data||data.length<2) return <div className="empty">Графік зʼявиться після старту</div>;
  const w=600,h=140,pad=6;
  const min=Math.min(...data),max=Math.max(...data),rng=(max-min)||1;
  const pts=data.map((v,i)=>[pad+i/(data.length-1)*(w-2*pad),h-pad-(v-min)/rng*(h-2*pad)]);
  const d=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const up=data[data.length-1]>=data[0];
  const col=up?"#46b76b":"#d96a6a";
  const area=d+` L ${w-pad} ${h-pad} L ${pad} ${h-pad} Z`;
  return (<svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:140}}>
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor={col} stopOpacity="0.18"/>
      <stop offset="100%" stopColor={col} stopOpacity="0"/></linearGradient></defs>
    <path d={area} fill="url(#g)"/><path d={d} fill="none" stroke={col} strokeWidth="2"/>
  </svg>);
}

function Setup({onStart,onBacktest,backtestResult}){
  const [amount,setAmount]=useState(500);
  const [risk,setRisk]=useState("conservative");
  const [mode,setMode]=useState("paper");
  const [confirmed,setConfirmed]=useState(false);
  const passed = backtestResult && backtestResult.passed;
  return (<div className="card">
    <h3>Налаштування стратегії</h3>
    <div className="setup">
      <div className="field"><label>Сума для роботи (USD)</label>
        <div className="seg">{[100,300,500,1000].map(a=>
          <button key={a} className={amount===a?"on":""} onClick={()=>setAmount(a)}>{a}</button>)}</div>
        <input className="mono" type="number" value={amount} onChange={e=>setAmount(+e.target.value)} style={{marginTop:8}}/>
      </div>
      <div className="field"><label>Рівень ризику</label>
        <div className="seg">
          <button className={risk==="conservative"?"on":""} onClick={()=>setRisk("conservative")}>Обережний</button>
          <button className={risk==="moderate"?"on":""} onClick={()=>setRisk("moderate")}>Помірний</button>
        </div>
        <p className="note">Обережний — ризик 0.5% на угоду, без плеча, пауза при просадці 8%. Рекомендовано для початку.</p>
      </div>
      <div className="field"><label>Режим</label>
        <div className="seg">
          <button className={mode==="paper"?"on":""} onClick={()=>setMode("paper")}>Paper (без грошей)</button>
          <button className={mode==="live"?"on":""} onClick={()=>setMode("live")}>Live (реальні гроші)</button>
        </div>
      </div>

      {mode==="live" && <div className="field" style={{background:"var(--panel2)",padding:12,borderRadius:8}}>
        <p className="note" style={{marginTop:0}}><b>Перед реальними грошима потрібно:</b></p>
        <p className="note">1. Пройти backtest (перевірка на історії).</p>
        <button className="btn-ghost" onClick={onBacktest} style={{margin:"6px 0"}}>Запустити backtest</button>
        {backtestResult && <pre className="mono" style={{whiteSpace:"pre-wrap",fontSize:11,color:passed?"var(--green)":"var(--red)",margin:"4px 0"}}>{backtestResult.summary}</pre>}
        <p className="note">2. Додати API-ключі Binance у файл <b>.env</b> на сервері (лише торгівля, вивід вимкнено).</p>
        <label style={{display:"flex",gap:8,alignItems:"center",marginTop:8,fontSize:13,color:"var(--ink)"}}>
          <input type="checkbox" checked={confirmed} onChange={e=>setConfirmed(e.target.checked)} style={{width:"auto"}}/>
          Я розумію ризик і підтверджую торгівлю реальними грошима
        </label>
      </div>}

      {mode==="paper" ?
        <button className="btn-go" onClick={()=>onStart({amount_usd:amount,risk_level:risk,mode:"paper"})}>
          Почати стратегію</button>
        :
        <button className="btn-go" disabled={!passed||!confirmed}
          onClick={()=>onStart({amount_usd:amount,risk_level:risk,mode:"live",live_confirmed:confirmed})}>
          {passed&&confirmed?"Почати з реальними грошима":"Виконайте умови вище"}</button>
      }
    </div>
  </div>);
}

function Dashboard({d,journal,onCmd,report,onNew}){
  const s=d.stats||{};
  const pnlCls=d.pnl>=0?"pos":"neg";
  const isReport=!!report;
  return (<div>
    {!isReport ?
      <div className="action-bar">
        {d.running && !d.paused && <button className="btn-ghost" onClick={()=>onCmd("pause")}>Пауза</button>}
        {d.paused && <button className="btn-go" onClick={()=>onCmd("resume")}>Відновити</button>}
        <button className="btn-ghost" onClick={()=>onCmd("close-all")}>Закрити всі угоди</button>
        <button className="btn-stop" onClick={()=>onCmd("stop")}>Зупинити і проаналізувати</button>
      </div>
      :
      <div className="action-bar">
        <button className="btn-go" onClick={onNew}>Почати новий цикл</button>
      </div>
    }

    <div className="grid cols-4" style={{marginBottom:14}}>
      <div className="card stat"><div className="label">Баланс</div>
        <div className="val mono">${f2(d.balance)}</div>
        <div className={"sub mono "+pnlCls}>{d.pnl>=0?"+":""}{f2(d.pnl)} ({d.pnl_pct>=0?"+":""}{f2(d.pnl_pct)}%)</div></div>
      <div className="card stat"><div className="label">Просадка</div>
        <div className="val mono">{f2(d.drawdown_pct)}%</div>
        <div className="sub">від максимуму балансу</div></div>
      <div className="card stat"><div className="label">Win rate</div>
        <div className="val mono">{s.trades?f2(s.win_rate)+"%":"—"}</div>
        <div className="sub mono">{s.wins||0} / {s.losses||0} угод</div></div>
      <div className="card stat"><div className="label">Profit factor</div>
        <div className="val mono">{s.profit_factor??"—"}</div>
        <div className="sub">{s.sample_sufficient?"вибірка достатня":"вибірка ще мала"}</div></div>
    </div>

    <div className="grid cols-2" style={{marginBottom:14}}>
      <div className="card"><h3>Крива капіталу</h3><Sparkline data={d.equity_curve}/></div>
      <div className="card"><h3>Що система робить зараз</h3>
        <div className="verdict"><span className="dot"></span><span>{d.last_action||"—"}</span></div>
        <p className="note" style={{marginTop:12}}>Відхилено угод за цей цикл: <b className="mono">{d.rejected||0}</b>. Це нормально — система чекає якісні можливості.</p>
      </div>
    </div>

    <div className="card" style={{marginBottom:14}}>
      <h3>Відкриті позиції</h3>
      {d.open_positions&&d.open_positions.length?
        <table><thead><tr><th>Актив</th><th>Напрям</th><th>Вхід</th><th>Стоп</th><th>Тейк</th><th>Розмір</th></tr></thead>
        <tbody>{d.open_positions.map((p,i)=><tr key={i}>
          <td>{p.asset}</td><td>{p.direction==="long"?"Лонг":"Шорт"}</td>
          <td className="mono">{f2(p.entry)}</td><td className="mono">{f2(p.stop)}</td>
          <td className="mono">{f2(p.take)}</td><td className="mono">{p.size}</td></tr>)}</tbody></table>
        :<div className="empty">Немає відкритих позицій</div>}
    </div>

    <div className="card">
      <h3>Журнал рішень</h3>
      {journal&&journal.length?
        <table><thead><tr><th>Актив</th><th>Дія</th><th>Причина</th><th>P/L</th></tr></thead>
        <tbody>{journal.map((e,i)=><tr key={i}>
          <td>{e.asset}</td>
          <td><span className={"tag "+(e.result==="win"?"win":e.result==="loss"?"loss":e.decision==="rejected"?"reject":"")}>
            {e.decision==="opened"?"Відкрито":e.decision==="closed"?(e.result==="win"?"Прибуток":"Збиток"):"Відмова"}</span></td>
          <td style={{maxWidth:340,color:"var(--muted)"}}>{e.reason}{e.supporting&&e.supporting.length?
            <div className="chips">{e.supporting.slice(0,3).map((c,j)=><span key={j} className="chip">{c}</span>)}</div>:null}</td>
          <td className={"mono "+(e.pnl>0?"pos":e.pnl<0?"neg":"")}>{e.pnl!=null?(e.pnl>0?"+":"")+f2(e.pnl):"—"}</td>
        </tr>)}</tbody></table>
        :<div className="empty">Журнал порожній</div>}
    </div>

    {report&&<div className="card" style={{marginTop:14}}>
      <h3>Звіт після зупинки</h3>
      <pre className="mono" style={{whiteSpace:"pre-wrap",fontSize:12,color:"var(--ink)",margin:0,lineHeight:1.5}}>{report}</pre>
    </div>}
  </div>);
}

function App(){
  const [d,setD]=useState(null);
  const [journal,setJournal]=useState([]);
  const [view,setView]=useState("setup");   // setup | live | report
  const [report,setReport]=useState("");
  const timer=useRef(null);

  const refresh=async()=>{
    const dash=await call("/api/dashboard");
    if(dash&&!dash.error){
      setD(dash);
      // якщо сервер уже має активну сесію (напр. після перезавантаження сторінки)
      if(dash.running && view==="setup") setView("live");
    }
    const j=await call("/api/journal?limit=20");
    if(j&&j.entries) setJournal(j.entries);
  };

  useEffect(()=>{ refresh(); timer.current=setInterval(refresh,1500); return ()=>clearInterval(timer.current); },[view]);

  const start=async(cfg)=>{
    setReport("");
    const r=await call("/api/start",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(cfg)});
    if(r&&r.detail){ alert("Live поки недоступний:\n"+(r.detail.checks||[]).join("\n")); return; }
    setView("live"); refresh();
  };
  const [backtestResult,setBacktestResult]=useState(null);
  const runBacktest=async()=>{
    setBacktestResult({summary:"Виконую backtest…",passed:false});
    const r=await call("/api/backtest",{method:"POST"});
    if(r&&!r.error) setBacktestResult(r);
  };
  const cmd=async(c)=>{
    const r=await call("/api/"+c,{method:"POST"});
    if(c==="stop"){ if(r.report) setReport(r.report); setView("report"); }
    refresh();
  };
  const newCycle=()=>{ setReport(""); setD(null); setView("setup"); };

  const status = d&&d.running?(d.paused?["st-pause","Пауза"]:["st-run","Працює"])
                : (view==="report"?["st-stop","Завершено"]:["st-stop","Зупинено"]);

  return (<div className="wrap">
    <header className="top">
      <div className="brand">Помічник трейдера<small>Поступовий ріст капіталу · контроль ризику</small></div>
      <div className={"status-pill "+status[0]}>{status[1]}</div>
    </header>
    {view==="setup" && <Setup onStart={start} onBacktest={runBacktest} backtestResult={backtestResult}/>}
    {view==="live" && (d ? <Dashboard d={d} journal={journal} onCmd={cmd} report=""/> : <div className="empty">Завантаження…</div>)}
    {view==="report" && (d ? <Dashboard d={d} journal={journal} onCmd={cmd} report={report} onNew={newCycle}/> : <div className="empty">Звіт недоступний</div>)}
    <div className="foot">
      Це навчально-дослідницький інструмент. Він <b>не обіцяє прибутку</b> і працює в режимі Paper Trading без реальних грошей.
      Risk Engine може заблокувати будь-яку угоду заради збереження капіталу. Минулі результати не гарантують майбутніх.
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
